<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>정보수집 | 강하고 담대하라</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="game-layout">
    <header class="topbar">
      <div>
        <p id="teamLabel">한 팀 · 역할 미션</p>
        <h1>정보수집담당</h1>
      </div>
      <button class="icon-button" id="clearCluesButton" type="button" aria-label="단서 기록 초기화">↺</button>
    </header>

    <section class="story-stage" id="setupStage">
      <div class="scene-art custom-bg" style="--scene-bg: url('image/Intro.png')" aria-hidden="true"></div>
      <div class="progress"><span class="active"></span></div>
      <p class="kicker">역할 확인하기</p>
      <h2>정보수집담당 준비</h2>
      <div class="story-copy">
        <p>나는 주변에서 정보를 수집하기로 했다. 문제를 풀기 위한 단서를 찾아서 팀원들에게 공유해야지!</p>
        <p>나랑 함께하는 팀원들은 누구일까?</p>
      </div>
      <div class="mission-box">
        <span>MISSION</span>
        <label class="mini-label" for="mainName">문제풀이담당</label>
        <input class="wide-input" id="mainName" autocomplete="off">
        <label class="mini-label" for="searchName1">검색담당</label>
        <input class="wide-input" id="searchName1" autocomplete="off">
      </div>
    </section>

    <form class="answer-panel" id="nameSetupForm">
      <button class="ready-button" type="submit">준비 끝</button>
      <p class="feedback" id="setupFeedback" role="status"></p>
    </form>

    <section class="clue-search" id="clueSearch">
      <div class="compass-art custom-bg" style="--scene-bg: url('image/back_2.png')" aria-hidden="true"></div>
      <h2>정보수집담당의 역할</h2>
      <p>문제풀이담당이 알려준 말을 입력하면 그 문제를 풀기 위한 단서가 열립니다.<br>도저히 모르겠다면 내 '키워드'를 검색담당에게 알려주세요.</p>
      <div id="clueEntry">
        <form id="clueForm">
          <label for="clueInput">전달받은 말</label>
          <div class="answer-row">
            <input id="clueInput" autocomplete="off" placeholder="예: 네갈래길">
            <button type="submit">열기</button>
          </div>
        </form>
        <p class="feedback" id="clueFeedback" role="status"></p>
      </div>
    </section>

    <section class="found-list" id="foundList" aria-label="찾은 단서"></section>
  </main>

  <div class="image-zoom-modal" id="imageZoomModal" hidden>
    <button class="image-zoom-close" id="imageZoomClose" type="button" aria-label="확대 이미지 닫기">×</button>
    <div class="image-zoom-viewport" id="imageZoomViewport">
      <img id="imageZoomTarget" alt="">
    </div>
  </div>

  <script src="game-data.js"></script>
  <script src="final-gate.js"></script>
  <script src="clues.js"></script>
</body>
</html>

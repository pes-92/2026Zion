<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>팀미션</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="home">
  <main class="shell">
    <section class="hero-panel">
      <div class="camp-mark">레크레이션</div>
      <h1>팀 미션</h1>
      <p>한 팀에 세 역할이 필요합니다.</p>
      <div class="verse">
        각 역할별 설명을 읽어보고, 팀원들과 상의하여 역할을 선택하세요. <br> <a style="color: #f2ff00;">단, 각각 한 명이 필요합니다.</a>
      </div>
      
    </section>

    <section class="role-grid role-grid-three" aria-label="역할 선택">
      <article class="role-card">
        <span>DEVICE 1</span>
        <h2>문제풀이담당</h2>
        <p>퀴즈의 정답을 입력해 다음 이야기로 넘어가는 역할입니다.</p>
        <div class="actions">
          <a class="button primary" href="main.html">시작하기</a>
        </div>
      </article>

      <article class="role-card">
        <span>DEVICE 2</span>
        <h2>정보수집담당</h2>
        <p> 문제를 풀기 위한 핵심 단서를 확인하는 역할입니다.</p>
        <div class="actions">
          <a class="button primary" href="clues.html">시작하기</a>
        </div>
      </article>

      <article class="role-card">
        <span>DEVICE 3</span>
        <h2>검색담당</h2>
        <p>사회자와 소통, 그리고 물건의 관리 등 웹 바깥의 정보를 담당합니다.<br> <a style= "color:#ff0000;">목사님이나 부장집사님이 담당하시면 됩니다.</a> </p>
        <div class="actions">
          <a class="button primary" href="search.html">시작하기</a>
        </div>
      </article>
    </section>
  </main>
</body>
</html>

<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>검색 | 강하고 담대하라</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="game-layout">
    <header class="topbar">
      <div>
        <p id="teamLabel">한 팀 · 역할 미션</p>
        <h1>검색담당</h1>
      </div>
      <button class="icon-button" id="clearCluesButton" type="button" aria-label="기록 초기화">↺</button>
    </header>

    <section class="story-stage" id="setupStage">
      <div class="scene-art custom-bg" style="--scene-bg: url('image/Intro.png')" aria-hidden="true"></div>
      <div class="progress"><span class="active"></span></div>
      <p class="kicker">역할 확인하기</p>
      <h2>검색담당 준비</h2>
      <div class="story-copy">
        <p>나는 검색 담당이다. 동굴 입구 근처에서만 인터넷이 통하는 것 같으니 사회자로부터 필요한 물건을 받아 전달하는 역할도 같이 하면 좋을 것 같다.</p>
        <p>나랑 함께하는 팀원들은 누구일까?</p>
      </div>
      <div class="mission-box">
        <span>MISSION</span>
        <label class="mini-label" for="mainName">문제풀이담당</label>
        <input class="wide-input" id="mainName" autocomplete="off">
        <label class="mini-label" for="infoName">정보수집담당</label>
        <input class="wide-input" id="infoName" autocomplete="off">
      </div>
    </section>

    <form class="answer-panel" id="nameSetupForm">
      <button class="ready-button" type="submit">준비 끝</button>
      <p class="feedback" id="setupFeedback" role="status"></p>
    </form>

    <section class="clue-search" id="clueSearch">
      <div class="compass-art custom-bg search-art" style="--scene-bg: url('image/back_2.png')" aria-hidden="true"></div>
      <h2>입구의 신호를 붙들라</h2>
      <p>사회자에게 받을 물건, QR 확인, 기억해야 할 숫자를 관리하는 화면입니다.</p>
      <div id="clueEntry">
        <form id="clueForm">
          <label for="clueInput">전달받은 말</label>
          <div class="answer-row">
            <input id="clueInput" autocomplete="off" placeholder="예: 지도">
            <button type="submit">열기</button>
          </div>
        </form>
        <p class="feedback" id="clueFeedback" role="status"></p>
      </div>
    </section>

    <section class="found-list" id="foundList" aria-label="열린 내용"></section>
  </main>

  <div class="image-zoom-modal" id="imageZoomModal" hidden>
    <button class="image-zoom-close" id="imageZoomClose" type="button" aria-label="확대 이미지 닫기">×</button>
    <div class="image-zoom-viewport" id="imageZoomViewport">
      <img id="imageZoomTarget" alt="">
    </div>
  </div>

  <script src="game-data.js"></script>
  <script src="final-gate.js"></script>
  <script src="search.js"></script>
</body>
</html>

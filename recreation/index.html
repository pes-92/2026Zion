<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>누구의 답일까? 설문</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="survey-shell">
    <section class="intro">
      <p class="eyebrow">시작 전 레크레이션</p>
      <h1>나는 이런 사람!</h1>
      <p>나에 대한 설문조사입니다. 질문을 선택하거나, 한두단어의 짧은 글로 적어주세요.</p>
    </section>

    <form class="panel" id="surveyForm">
      <label class="field">
        <span>이름</span>
        <input id="participantName" name="participantName" autocomplete="name" required>
      </label>

      <div class="question-list" id="questionList"></div>

      <button class="primary-button" type="submit">응답 제출</button>
      <p class="status" id="submitStatus" role="status"></p>
    </form>
  </main>

  <script src="config.js"></script>
  <script src="questions.js"></script>
  <script src="app.js"></script>
</body>
</html>

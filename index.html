<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SION Retreat Sites</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="home">
  <main class="shell">
    <section class="hero-panel">
      <div class="camp-mark">SION RETREAT</div>
      <h1>사이트 선택</h1>
      <p>각 폴더는 따로 배포할 수 있도록 독립 구조로 정리했습니다.</p>
      <div class="verse">
        시작 전 레크레이션과 모바일 방탈출을 분리했습니다. 실제 배포할 때는 필요한 폴더 하나만 업로드하면 됩니다.
      </div>
    </section>

    <section class="role-grid" aria-label="사이트 선택">
      <article class="role-card">
        <span>RECREATION</span>
        <h2>시작 전 레크레이션</h2>
        <p>참여자가 각자 휴대폰으로 설문을 제출합니다. 진행자 화면은 별도 주소로 PC에서 엽니다.</p>
        <div class="actions">
          <a class="button primary" href="recreation/index.html">설문 화면</a>
        </div>
      </article>

      <article class="role-card">
        <span>ESCAPE GAME</span>
        <h2>모바일 방탈출</h2>
        <p>문제풀이담당, 정보수집담당, 검색담당 역할을 나누어 진행하는 모바일 팀 미션입니다.</p>
        <div class="actions">
          <a class="button primary" href="mobile-escape/index.html">역할 선택</a>
        </div>
      </article>
    </section>
  </main>
</body>
</html>
